name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/sti-summerschool-website-Kh7q3
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Build site
        env:
          # Change these when a custom domain is configured.
          SITE_URL: ${{ vars.SITE_URL || 'https://dvh147.github.io' }}
          BASE_PATH: ${{ vars.BASE_PATH || '/sti26' }}
          PUBLIC_FORMSPREE_ID: ${{ vars.PUBLIC_FORMSPREE_ID || secrets.PUBLIC_FORMSPREE_ID || 'your-form-id-here' }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
