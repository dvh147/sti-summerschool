name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    # Only run in the public site repo. The private repo has no Pages and
    # uses sync-public.yml to push changes to the public repo, which then
    # triggers this workflow there.
    if: github.repository != 'dvh147/sti26'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Build site
        env:
          # SITE_URL defaults to the apex custom domain. BASE_PATH is empty
          # for the apex domain; set it on the public repo only if the site
          # is ever served from a subpath (e.g. /<repo>/).
          SITE_URL: ${{ vars.SITE_URL || 'https://stisummerschool.org' }}
          BASE_PATH: ${{ vars.BASE_PATH }}
          PUBLIC_REGISTRATION_API: ${{ vars.PUBLIC_REGISTRATION_API || 'https://your-worker.example.workers.dev' }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY || '' }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.repository != 'dvh147/sti26'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
